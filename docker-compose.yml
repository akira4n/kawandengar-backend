version: "3.8"

services:
  backend-app:
    build: .
    container_name: whisper-model-service
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - whisper_model_cache:/root/.cache/whisper
    environment:
      - PYTHONUNBUFFERED=1
      - ENV=production

volumes:
  whisper_model_cache:
